<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Rappel Animoa</title>
</head>
<body style="margin:0;background:#f3f8f7;font-family:Arial,Helvetica,sans-serif;color:#173733">
  <!--
    Ce fichier est un aperçu visuel.
    Il ne doit PAS être collé dans les modèles Authentication de Supabase.
    L'Edge Function génère automatiquement la version finale avec les vraies données.
  -->
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f3f8f7;padding:24px 12px">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:620px;background:#ffffff;border-radius:24px;overflow:hidden">
          <tr>
            <td align="center" style="padding:30px 26px 18px">
              <img src="https://animoa.fr/assets/animoa-logo-email.png" width="230" alt="Animoa" style="display:block;max-width:75%;height:auto">
            </td>
          </tr>
          <tr>
            <td style="padding:8px 34px 34px">
              <div style="display:inline-block;background:#e4f8f5;color:#118d84;border-radius:999px;padding:7px 12px;font-size:12px;font-weight:700">
                RAPPEL · LA VEILLE
              </div>
              <h1 style="font-size:28px;line-height:1.2;margin:18px 0 10px">
                Un événement important arrive bientôt pour {{NOM_ANIMAL}}
              </h1>
              <p style="font-size:16px;line-height:1.65;color:#526763">
                Un rappel a été programmé pour <strong>{{NOM_ANIMAL}}</strong>.
              </p>
              <div style="background:#f5fbfa;border:1px solid #d9efec;border-radius:18px;padding:20px 22px">
                <div style="font-size:20px;font-weight:800;margin-bottom:8px">{{TITRE_EVENEMENT}}</div>
                <p><strong>Date :</strong> {{DATE}}</p>
                <p><strong>Catégorie :</strong> {{TYPE}}</p>
                <p><strong>Professionnel :</strong> {{PROFESSIONNEL}}</p>
              </div>
              <div style="text-align:center;margin:28px 0 10px">
                <a href="https://animoa.fr" style="display:inline-block;background:#23b9ad;color:#fff;text-decoration:none;font-weight:800;border-radius:14px;padding:14px 24px">
                  Ouvrir Animoa
                </a>
              </div>
              <p style="font-size:12px;color:#81908d;text-align:center">
                Animoa — Toute sa vie, près de vous.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
